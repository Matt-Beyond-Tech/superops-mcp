# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - superopsApiToken
      - superopsSubdomain
    properties:
      superopsApiToken:
        type: string
        description: Your SuperOps.ai API token
      superopsSubdomain:
        type: string
        description: Your SuperOps.ai subdomain
      superopsRegion:
        type: string
        description: Your SuperOps.ai region (if applicable)
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { SUPEROPS_API_TOKEN: config.superopsApiToken, SUPEROPS_SUBDOMAIN: config.superopsSubdomain, SUPEROPS_REGION: config.superopsRegion || '', MCP_TRANSPORT: 'stdio' } })
